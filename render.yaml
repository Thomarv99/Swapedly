services:
  - type: web
    name: swapedly
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: RENDER
        value: true
    disk:
      name: swapedly-data
      mountPath: /data
      sizeGB: 1
