services:
  - type: web
    name: swapedly
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: RENDER
        value: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PLUS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_CREDITS_10
        sync: false
      - key: STRIPE_PRICE_CREDITS_25
        sync: false
      - key: STRIPE_PRICE_CREDITS_50
        sync: false
    disk:
      name: swapedly-data
      mountPath: /data
      sizeGB: 1
