services:
  - type: web
    name: swapedly
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PLUS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_CREDITS_10
        sync: false
      - key: STRIPE_PRICE_CREDITS_25
        sync: false
      - key: STRIPE_PRICE_CREDITS_50
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GIFT_CARD_CODE
        sync: false
